<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>وصال — الخدمات</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="services">
  <div id="layout-header"></div>
  <main class="main-content">
    <div id="page-root"></div>
  </main>
  <div id="layout-bottom-nav"></div>

  <script src="/js/config.js"></script>
  <script src="/js/translations.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    window.addEventListener("layout-ready", async function () {
      const root = document.getElementById("page-root");
      root.innerHTML = `
        <div class="skeleton" style="height:40px;max-width:320px;margin:0 auto 10px"></div>
        <div class="skeleton" style="height:22px;max-width:420px;margin:0 auto 32px"></div>
        <div class="grid-2">${[1,2,3,4].map(()=>`<div class="skeleton" style="height:150px"></div>`).join("")}</div>`;

      try {
        const cats = await API.getServices();
        const lang = localStorage.getItem(Config.KEYS.LANG) || "ar";

        const parts = cats.map(c => {
          const n = lang === "ar" ? c.nameAr : c.nameEn;
          const prices = (c.options || []).map(o => Number(o.priceBase));
          if (!prices.length) return n;
          const mn = Math.min(...prices), mx = Math.max(...prices);
          return lang === "ar"
            ? (mn === mx ? `${n} بسعر ${mn} ريال` : `${n} من ${mn} إلى ${mx} ريال`)
            : (mn === mx ? `${n} for ${mn} SAR` : `${n} ${mn}–${mx} SAR`);
        });
        speak((lang === "ar" ? "الخدمات المتاحة: " : "Available services: ") + parts.join("، "));

        root.innerHTML = `
          <button class="back-btn" onclick="history.back()">← ${T("common.back")}</button>
          <div class="page-header">
            <h1>${T("services.title")}</h1>
            <p>${T("services.subtitle")}</p>
          </div>
          <div class="grid-2 fade-in" style="max-width:860px;margin:0 auto">
            ${cats.map(c => {
              const name = lang === "ar" ? c.nameAr : c.nameEn;
              const desc = lang === "ar" ? c.descriptionAr : c.descriptionEn;
              const prices = (c.options || []).map(o => Number(o.priceBase));
              const mn = prices.length ? Math.min(...prices) : null;
              const mx = prices.length ? Math.max(...prices) : null;
              const priceStr = mn !== null ? (mn === mx ? `${mn} ${T("common.sar")}` : `${mn} – ${mx} ${T("common.sar")}`) : "";
              return `
                <a href="/service-detail.html?id=${c.id}" class="card-link">
                  <div class="card hover" style="height:100%">
                    <div class="flex items-center gap-3 mb-3">
                      <div class="card-icon">${c.icon}</div>
                      <div>
                        <h2 class="text-xl font-bold">${name}</h2>
                        ${priceStr ? `<p class="text-sm font-semibold" style="color:var(--primary);margin-top:2px">${priceStr}</p>` : ""}
                      </div>
                    </div>
                    <p class="text-muted">${desc}</p>
                  </div>
                </a>`;
            }).join("")}
          </div>`;
      } catch {
        root.innerHTML = `<p class="text-center" style="color:var(--destructive)">${T("common.error")}</p>`;
      }
    });
  </script>
</body>
</html>
