<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>وصال — تفاصيل الخدمة</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="services">
  <div id="layout-header"></div>
  <main class="main-content">
    <div id="page-root"></div>
  </main>
  <div id="layout-bottom-nav"></div>

  <script src="/js/config.js"></script>
  <script src="/js/translations.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    window.addEventListener("layout-ready", async function () {
      const root   = document.getElementById("page-root");
      const params = new URLSearchParams(location.search);
      const id     = params.get("id");
      if (!id) { location.href = "/services.html"; return; }

      root.innerHTML = `<div class="skeleton" style="height:40px;width:260px;margin-bottom:12px"></div>
        <div class="skeleton" style="height:24px;margin-bottom:24px"></div>
        ${[1,2,3].map(()=>`<div class="skeleton" style="height:130px;margin-bottom:14px"></div>`).join("")}`;

      try {
        const svc  = await API.getService(id);
        const lang = localStorage.getItem(Config.KEYS.LANG) || "ar";
        const name = lang === "ar" ? svc.nameAr : svc.nameEn;
        const desc = lang === "ar" ? svc.descriptionAr : svc.descriptionEn;
        const optNames = svc.options.map(o => lang === "ar" ? o.nameAr : o.nameEn).join("، ");
        speak(`${name}. ${desc}. ${lang === "ar" ? "الخيارات:" : "Options:"} ${optNames}`);

        root.innerHTML = `
          <div class="fade-in" style="max-width:840px;margin:0 auto">
            <button class="back-btn" onclick="history.back()">← ${T("common.back")}</button>
            <div class="flex items-center gap-4 mb-4">
              <div class="card-icon" style="width:64px;height:64px;font-size:2rem">${svc.icon}</div>
              <div>
                <h1 class="text-primary">${name}</h1>
              </div>
            </div>
            <p class="text-muted text-lg mb-8">${desc}</p>

            <h2 class="mb-4">${T("services.options")}</h2>
            <div class="space-y-4">
              ${svc.options.map(opt => {
                const oname = lang === "ar" ? opt.nameAr : opt.nameEn;
                const odesc = lang === "ar" ? opt.descriptionAr : opt.descriptionEn;
                return `
                  <div class="option-card">
                    <div class="option-body">
                      <h3>${oname}</h3>
                      <p class="text-muted mt-2">${odesc}</p>
                    </div>
                    <div class="option-price-col">
                      <div>
                        <p class="text-xs text-muted mb-1">${T("services.base_price")}</p>
                        <p class="price-big text-primary">${opt.priceBase} <span class="text-muted" style="font-size:1rem;font-weight:400">${T("common.sar")}</span></p>
                      </div>
                      <a href="/book.html?serviceId=${svc.id}&optionId=${opt.id}" style="width:100%">
                        <button class="btn btn-primary btn-full">${T("common.book_now")}</button>
                      </a>
                    </div>
                  </div>`;
              }).join("")}
            </div>
          </div>`;
      } catch {
        root.innerHTML = `<p style="color:var(--destructive)">${T("common.error")}</p>`;
      }
    });
  </script>
</body>
</html>
